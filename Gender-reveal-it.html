<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratta per scoprire</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
background:radial-gradient(circle,#bfe0ff,#6bb6ff,#2f80ff);
overflow:hidden;
}

#card{
position:relative;
width:90vw;
max-width:380px;
height:220px;
border-radius:20px;
overflow:hidden;
background:white;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

#message{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:1;
}

#baby{
font-size:55px;
animation:bounce 2s infinite;
}

#title{
font-size:28px;
font-weight:bold;
color:#1e6ee6;
}

#subtitle{
margin-top:8px;
font-size:16px;
color:#444;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:2;
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(720deg);
}
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

</style>
</head>

<body>

<div id="card">

<div id="message">
<div id="baby">👶</div>
<div id="title">È UN MASCHIETTO! 💙</div>
<div id="subtitle">Christophe e Irene aspettano un bambino!</div>
</div>

<canvas id="scratch"></canvas>

</div>

<audio id="sound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b4c70.mp3?filename=small-crowd-cheer-6713.mp3">
</audio>

<script>

const canvas=document.getElementById("scratch")
const ctx=canvas.getContext("2d")
const rect=document.getElementById("card").getBoundingClientRect()

canvas.width=rect.width
canvas.height=rect.height

ctx.fillStyle="#c0c6cf"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.font="22px Arial"
ctx.textAlign="center"
ctx.fillText("Gratta qui!",canvas.width/2,canvas.height/2)

let drawing=false
let revealed=false

function scratch(e){

if(!drawing) return

const r=canvas.getBoundingClientRect()
const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left
const y=(e.touches?e.touches[0].clientY:e.clientY)-r.top

ctx.globalCompositeOperation="destination-out"
ctx.beginPath()
ctx.arc(x,y,20,0,Math.PI*2)
ctx.fill()

checkReveal()
}

function checkReveal(){

if(revealed) return

const pixels=ctx.getImageData(0,0,canvas.width,canvas.height).data
let transparent=0

for(let i=3;i<pixels.length;i+=4){
if(pixels[i]==0) transparent++
}

if(transparent/pixels.length>0.12){
revealed=true
launchConfetti()
document.getElementById("sound").play()
}
}

function launchConfetti(){

for(let i=0;i<150;i++){

const c=document.createElement("div")
c.className="confetti"

c.style.left=Math.random()*100+"vw"

const colors=["#3aa0ff","#5bc0ff","#1e6ee6","#9ad9ff","#ffffff"]
c.style.background=colors[Math.floor(Math.random()*colors.length)]

const size=6+Math.random()*10
c.style.width=size+"px"
c.style.height=size+"px"

c.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(c)
}
}

canvas.addEventListener("mousedown",()=>drawing=true)
canvas.addEventListener("mouseup",()=>drawing=false)
canvas.addEventListener("mousemove",scratch)

canvas.addEventListener("touchstart",()=>drawing=true)
canvas.addEventListener("touchend",()=>drawing=false)
canvas.addEventListener("touchmove",scratch)

</script>

</body>
</html>
