<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch to reveal</title>

<style>
body{
font-family:sans-serif;
background:#eef6ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#card{
position:relative;
width:340px;
height:220px;
border-radius:16px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
background:white;
}

#message{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-size:26px;
font-weight:bold;
color:#1e6ee6;
}

#sub{
font-size:16px;
margin-top:10px;
color:#333;
}

canvas{
position:absolute;
top:0;
left:0;
}

.confetti{
position:fixed;
width:8px;
height:8px;
background:#3aa0ff;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}
</style>
</head>

<body>

<div id="card">

<div id="message">
👶 It's a BOY! 💙
<div id="sub">Christophe & Irene are having a baby boy!</div>
</div>

<canvas id="scratch"></canvas>

</div>

<script>

const canvas=document.getElementById("scratch")
const ctx=canvas.getContext("2d")
const rect=document.getElementById("card").getBoundingClientRect()

canvas.width=rect.width
canvas.height=rect.height

ctx.fillStyle="#bfc6d1"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.font="20px sans-serif"
ctx.textAlign="center"
ctx.fillText("Scratch here!",canvas.width/2,canvas.height/2)

let drawing=false
let revealed=false

function scratch(e){

if(!drawing) return

const r=canvas.getBoundingClientRect()
const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left
const y=(e.touches?e.touches[0].clientY:e.clientY)-r.top

ctx.globalCompositeOperation="destination-out"
ctx.beginPath()
ctx.arc(x,y,18,0,Math.PI*2)
ctx.fill()

checkReveal()
}

function checkReveal(){

if(revealed) return

const pixels=ctx.getImageData(0,0,canvas.width,canvas.height).data
let transparent=0

for(let i=3;i<pixels.length;i+=4){
if(pixels[i]==0) transparent++
}

if(transparent/pixels.length>0.15){
revealed=true
launchConfetti()
}
}

function launchConfetti(){

for(let i=0;i<80;i++){
const c=document.createElement("div")
c.className="confetti"
c.style.left=Math.random()*100+"vw"
c.style.background=["#3aa0ff","#5bc0ff","#1e6ee6","#8fd3ff"][Math.floor(Math.random()*4)]
c.style.animationDuration=(2+Math.random()*3)+"s"
document.body.appendChild(c)
}
}

canvas.addEventListener("mousedown",()=>drawing=true)
canvas.addEventListener("mouseup",()=>drawing=false)
canvas.addEventListener("mousemove",scratch)

canvas.addEventListener("touchstart",()=>drawing=true)
canvas.addEventListener("touchend",()=>drawing=false)
canvas.addEventListener("touchmove",scratch)

</script>

</body>
</html>
